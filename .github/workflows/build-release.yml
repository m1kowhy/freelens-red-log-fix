name: Auto Build Custom Freelens

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Our Repo
        uses: actions/checkout@v4

      - name: Clone Official Freelens
        run: |
          git clone https://github.com/freelensapp/freelens.git freelens-src
          cd freelens-src
          echo "LATEST_COMMIT=$(git rev-parse --short HEAD)" >> $env:GITHUB_ENV

      - name: Apply Custom Log Patch
        run: |
          $targetFile = Get-ChildItem -Path "freelens-src" -Filter "list.tsx" -Recurse | Select-Object -First 1
          if ($targetFile) {
              Write-Host "Znaleziono plik docelowy w ścieżce: $($targetFile.FullName)"
              Copy-Item "patches/list.tsx" $targetFile.FullName -Force
              Write-Host "Poprawka zaaplikowana pomyślnie!"
          } else {
              Write-Host "BŁĄD: Nie znaleziono pliku list.tsx w repozytorium Freelens!"
              exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" # ZMIANA: Instalujemy wersję 24, której wymaga Freelens

      - name: Install PNPM
        run: npm install -g pnpm

      - name: Install Dependencies
        run: |
          cd freelens-src
          # ZMIANA: Dodajemy flagę bezpieczeństwa, gdyby pnpm dalej marudził o wersje
          pnpm install --no-frozen-lockfile --ignore-engine

      - name: Build Project
        run: |
          cd freelens-src
          pnpm build

      - name: Build Windows Executable
        run: |
          cd freelens-src/freelens
          pnpm exec electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "custom-build-${{ env.LATEST_COMMIT }}"
          name: "Freelens z Białymi Logami (Commit ${{ env.LATEST_COMMIT }})"
          body: "Automatyczny build z podmienionym filtrem kolorów ANSI dla błędów."
          draft: false
          prerelease: false
          files: freelens-src/freelens/dist/*.exe
